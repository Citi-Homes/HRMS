function titleize(value) {
  if (value === "cv_link") return "CV Link";
  return value.replaceAll("_", " ").replace(/\b\w/g, (char) => char.toUpperCase());
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"]/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[char]));
}

function displayNameForEmail(email = "") {

function normalizedEmail() {

function departmentGroup(value = "") {
  const text = String(value).toLowerCase();
  if (text.includes("procurement")) return "Procurement";
  if (text.includes("finance")) return "Finance";
  if (text.includes("p&c") || text.includes("admin") || text.includes("culture")) return "P&C";
  return "Operations";
}

function isSuperUser() {

function isViewer() {

function canEdit() {

function canViewTable(table) {
  if (isSuperUser()) return true;
  if (table === "employee_hierarchy") return false;
  const permissions = {
    employees: "can_view_employee_master",
    recruitment: "can_view_recruitment",
    interview_evaluation: "can_view_recruitment",
    joining_checklist: "can_view_employee_master",
    leave_management: "can_manage_leave",
    documents: "can_view_employee_master",
    vendors: "can_manage_vendors",
    inventory: "can_manage_inventory",
    pantry: "can_manage_pantry",
    utilities: "can_manage_vendors",
    tasks: "can_manage_leave"
  };
  const permission = permissions[table];
  return permission ? Boolean(state.portalUser?.[permission]) : false;
}


function canEditTable(table) {
  if (table === "employees") return isSuperUser();
  if (table === "leave_management") return canRequestLeave();
  if (["vendors", "inventory", "pantry"].includes(table)) return isSuperUser() || canViewTable(table);
  return isSuperUser();
}

function canExportTable(table) {
  if (table === "employees") return isSuperUser();
  return isSuperUser() || canViewTable(table);
}

function canViewAttendancePortal() {
  return isSuperUser() || Boolean(state.portalUser?.can_view_attendance);

function canRequestLeave() {
  return isSuperUser() || Boolean(state.portalUser?.can_manage_leave);
}

function canViewPage(page) {
  if (page.key === "access_control" || page.key === "hierarchy") return isSuperUser();
  if (page.key === "attendance") return canViewAttendancePortal();
  if (page.table) return canViewTable(page.table);

}


function csvCell(value) {
  const text = String(value ?? "");
  return /[",\n\r]/.test(text) ? `"${text.replaceAll('"', '""')}"` : text;
}

function looksLikeDateValue(value) {
  const text = String(value || "").trim();
  return /^\d{1,2}[/-]\d{1,2}[/-]\d{2,4}$/.test(text) ||
    /^\d{4}[/-]\d{1,2}[/-]\d{1,2}$/.test(text) ||
    /^\d{1,2}\s+[A-Za-z]{3,}\s+\d{2,4}$/.test(text);
}

function looksLikeNameValue(value) {
  const text = String(value || "").trim();
  return Boolean(text) && text.length >= 3 && !looksLikeDateValue(text) && /[A-Za-z]/.test(text);
}

async function signIn(email, password) {
  if (!client) throw new Error("Supabase anon key is not configured in assets/supabase-config.js.");
  const { data, error } = await client.auth.signInWithPassword({ email, password });
  if (error) throw error;
  state.session = data.session;
  state.portalUser = await verifyPortalAccess();
  return data.session;
}

async function verifyPortalAccess() {
  const email = normalizedEmail();
  if (!email) throw new Error("Unable to identify the signed-in account.");
  const { data: rpcData, error: rpcError } = await client.rpc("get_my_admin_portal_user");
  if (!rpcError && Array.isArray(rpcData) && rpcData.length) {
    const { data: fullProfile } = await client
      .from("admin_portal_users")
      .select("*")
      .eq("email", email)
      .maybeSingle();
    return fullProfile || rpcData[0];
  }

  const { data, error } = await client
    .from("admin_portal_users")
    .select("*")
    .eq("email", email)
    .eq("is_active", true)
    .maybeSingle();
  if (error) throw new Error(rpcError?.message || "Your login worked, but the administration access rule is not ready yet.");
  if (!data) {
    await client.auth.signOut();
    throw new Error("This account is not approved for the Administration System.");
  }
  return data;
}

async function fetchRows(table) {
  const { data, error } = await client.from(table).select("*").order("id", { ascending: true }).limit(1000);
  if (error) throw error;
  return data || [];
}

async function upsertRow(table, row) {
  const { data, error } = await client.from(table).upsert(row).select().single();
  if (error) throw error;
  return data;
}

function isInterviewScheduled(row) {
  return String(row?.status || "").trim().toLowerCase() === "interview scheduled";
}

async function syncInterviewEvaluationFromRecruitment(row) {
  if (!row || !isInterviewScheduled(row) || !looksLikeNameValue(row.candidate)) return;

  const payload = {
    candidate: row.candidate,
    position: row.position || "",
    department: "Citi Homes",
    interview_date: row.interview_date || null
  };
  Object.keys(payload).forEach((key) => {
    if (payload[key] === "" || payload[key] === null || payload[key] === undefined) delete payload[key];
  });

  let query = client.from("interview_evaluation").select("id").eq("candidate", row.candidate).limit(1);
  if (row.position) query = query.eq("position", row.position);
  if (row.interview_date) query = query.eq("interview_date", row.interview_date);

  const { data, error } = await query;
  if (error) throw error;

  const existing = (data || [])[0];
  if (existing?.id) {
    const { error: updateError } = await client.from("interview_evaluation").update(payload).eq("id", existing.id);
    if (updateError) throw updateError;
    return;
  }

  const { error: insertError } = await client.from("interview_evaluation").insert(payload);
  if (insertError) throw insertError;
}

async function deleteRow(table, id) {
  const { error } = await client.from(table).delete().eq("id", id);
  if (error) throw error;
}

async function clearTable(table) {
  const batchSize = 250;
  for (;;) {
    const { data, error } = await client.from(table).select("id").order("id", { ascending: true }).limit(batchSize);
    if (error) throw error;
    const ids = (data || []).map((row) => row.id).filter((id) => id !== null && id !== undefined);
    if (!ids.length) break;
    const { error: deleteError } = await client.from(table).delete().in("id", ids);
    if (deleteError) throw deleteError;
    if (ids.length < batchSize) break;
  }
}

function updateAbuDhabiTime() {
  const formatter = new Intl.DateTimeFormat("en-AE", {
    timeZone: "Asia/Dubai",
    hour: "2-digit",
    minute: "2-digit",
    hour12: true
  });
  $("#abuDhabiTime").textContent = formatter.format(new Date());
}

async function loadAbuDhabiWeather() {
  try {
    const response = await fetch("https://api.open-meteo.com/v1/forecast?latitude=24.4539&longitude=54.3773&current=temperature_2m&timezone=Asia%2FDubai");
    if (!response.ok) throw new Error("Weather unavailable");
    const payload = await response.json();
    const value = payload.current?.temperature_2m;
    state.weather = Number.isFinite(value) ? Math.round(value) : null;
  } catch {
    state.weather = null;
  }
  $("#abuDhabiWeather").textContent = state.weather === null ? "--°C" : `${state.weather}°C`;
}

async function loadHierarchyData(options = {}) {
  if (!options.force && state.rows.employee_hierarchy) return;
  try {
    state.rows.employee_hierarchy = await fetchRows("employee_hierarchy");
  } catch (error) {
    state.rows.employee_hierarchy = [];
    console.warn("Unable to load hierarchy rules", error);
  }
}


function activeHierarchyRows() {
  return (state.rows.employee_hierarchy || []).filter((row) => row.is_active !== false && String(row.is_active) !== "false");
}


function hierarchyRulesForCurrentUser() {
  const email = normalizedEmail();
  const profileName = normalizePerson(currentProfileName());
  return activeHierarchyRows().filter((row) => {
    const managerEmail = String(row.manager_email || "").toLowerCase();
    const managerName = normalizePerson(row.manager_name);
    return managerEmail === email || (profileName && managerName === profileName);
  });
}


function currentUserEmployee() {
  const employees = state.rows.employees || [];
  const email = normalizedEmail();
  const profileName = currentProfileName();
  const normalizedProfileName = normalizePerson(profileName);
  return employees.find((employee) => {
    const values = Object.entries(employee || {});
    const emailMatch = values.some(([key, value]) => key.toLowerCase().includes("email") && String(value || "").toLowerCase() === email);
    const nameMatch = normalizePerson(employee.name) === normalizedProfileName || normalizePerson(employeeDisplay(employee)).includes(normalizedProfileName);
    return emailMatch || nameMatch;
  }) || employeeForLeave(profileName) || (isSuperUser() ? employees[0] : null);
}


function employeeKeys(employee) {
  if (!employee) return new Set();
  return new Set([
    normalizePerson(employee.employee_id),
    normalizePerson(employee.name),
    normalizePerson(employee.email),
    normalizePerson(employee.work_email),
    normalizePerson(employee.registered_email),
    normalizePerson(employeeDisplay(employee))
  ].filter(Boolean));
}


function rowPersonValue(table, row) {
  if (table === "employees") return employeeDisplay(row);
  if (["leave_management", "documents", "joining_checklist"].includes(table)) return row.employee;
  if (table === "inventory") return row.responsible_person;
  return "";
}


function rowMatchesEmployee(rowValue, allowedKeys) {
  const key = normalizePerson(rowValue);
  if (!key) return false;
  if (allowedKeys.has(key)) return true;
  return [...allowedKeys].some((allowed) => allowed && (key.includes(allowed) || allowed.includes(key)));
}


function hierarchyScopeForCurrentUser() {
  if (isSuperUser()) return "All Records";
  const rules = hierarchyRulesForCurrentUser();
  const scopeOrder = ["Own Record Only", "Juniors Only", "Custom Selected Employees", "Department", "All Records"];
  return rules.reduce((best, row) => {
    const scope = row.visibility_scope || "Juniors Only";
    return scopeOrder.indexOf(scope) > scopeOrder.indexOf(best) ? scope : best;
  }, rules.length ? "Juniors Only" : "Own Record Only");
}


function allowedEmployeeKeysForCurrentUser() {
  if (isSuperUser()) return null;
  const keys = new Set();
  const ownEmployee = currentUserEmployee();
  employeeKeys(ownEmployee).forEach((key) => keys.add(key));
  const profileName = normalizePerson(currentProfileName());
  if (profileName) keys.add(profileName);
  hierarchyRulesForCurrentUser().forEach((row) => {
    [row.employee_id, row.employee_name, row.employee_email].forEach((value) => {
      const key = normalizePerson(value);
      if (key) keys.add(key);
    });
  });
  return keys;
}


function rowVisibleByHierarchy(table, row) {
  if (isSuperUser()) return true;
  const personTables = ["employees", "leave_management", "documents", "joining_checklist", "inventory"];
  if (!personTables.includes(table)) return true;
  const scope = hierarchyScopeForCurrentUser();
  if (scope === "All Records") return true;
  const ownEmployee = currentUserEmployee();
  if (scope === "Department") {
    const ownDept = departmentGroup(ownEmployee?.department || state.portalUser?.department || "");
    const rowDept = table === "employees" ? departmentGroup(row.department || "") : departmentGroup(row.department || employeeForLeave(rowPersonValue(table, row))?.department || "");
    return ownDept && rowDept === ownDept;
  }
  const allowedKeys = allowedEmployeeKeysForCurrentUser();
  return rowMatchesEmployee(rowPersonValue(table, row), allowedKeys);
}


function visibleEmployeeOptions() {
  return (state.rows.employees || [])
    .filter((employee) => rowVisibleByHierarchy("employees", employee))
    .map((employee) => employeeDisplay(employee))
    .filter(Boolean);
}


function canApproveLeaveRow(row) {
  if (isSuperUser()) return true;
  if (!canRequestLeave()) return false;
  return rowVisibleByHierarchy("leave_management", row);
}


function filteredRows(page) {
  const rows = [...(state.rows[page.table] || [])];
  const search = state.search.trim().toLowerCase();
  return rows.filter((row) => {
    const hierarchyOk = rowVisibleByHierarchy(page.table, row);
    const deptOk = page.key !== "employees" || state.activeFilter === "All" || departmentGroup(row.department) === state.activeFilter;
    const searchOk = !search || Object.values(row).join(" ").toLowerCase().includes(search);
    return hierarchyOk && deptOk && searchOk;
  });
}


function parseAppDate(value) {
  if (!value) return null;
  const date = new Date(value);
  return Number.isNaN(date.getTime()) ? null : date;
}

function todayIso() {
  return new Date().toISOString().slice(0, 10);
}

function daysBetweenInclusive(startValue, endValue) {
  const start = parseAppDate(startValue);
  const end = parseAppDate(endValue);
  if (!start || !end || end < start) return 0;
  return Math.floor((end - start) / 86400000) + 1;
}

function annualAccruedDays(joiningDate, asOfDate = new Date()) {
  const join = parseAppDate(joiningDate);
  if (!join || asOfDate < join) return 0;
  const firstAnniversary = new Date(join);
  firstAnniversary.setFullYear(firstAnniversary.getFullYear() + 1);
  const firstEnd = asOfDate < firstAnniversary ? asOfDate : firstAnniversary;
  const firstDays = Math.max(0, (firstEnd - join) / 86400000);
  const laterDays = asOfDate > firstAnniversary ? Math.max(0, (asOfDate - firstAnniversary) / 86400000) : 0;
  return Number(((firstDays * (24 / 365)) + (laterDays * (30 / 365))).toFixed(2));
}

function normalizePerson(value) {
  return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
}

function employeeDisplay(employee) {
  if (!employee) return "";
  return [employee.employee_id, employee.name].filter(Boolean).join(" - ") || employee.name || employee.employee_id || "";
}

function employeeForLeave(value) {
  const employees = state.rows.employees || [];
  const target = normalizePerson(value);
  return employees.find((employee) => {
    const name = normalizePerson(employee.name);
    const id = normalizePerson(employee.employee_id);
    const combined = normalizePerson(employeeDisplay(employee));
    return target === name || target === id || target === combined || combined.includes(target) || target.includes(name);
  }) || null;
}

function approvedAnnualUsedByEmployee(employeeValue, rows = state.rows.leave_management || [], excludingId = null) {
  const employee = employeeForLeave(employeeValue);
  const target = normalizePerson(employeeDisplay(employee) || employeeValue);
  return rows.reduce((sum, row) => {
    if (excludingId && String(row.id) === String(excludingId)) return sum;
    if (String(row.leave_type || "").toLowerCase() !== "annual leave") return sum;
    if (String(row.approval_status || "").toLowerCase() !== "approved") return sum;
    const rowEmployee = normalizePerson(employeeDisplay(employeeForLeave(row.employee)) || row.employee);
    if (rowEmployee !== target) return sum;
    return sum + Number(row.requested_days || row.used || 0);
  }, 0);
}

function leaveBalanceForEmployee(employeeValue, excludingId = null) {
  const employee = employeeForLeave(employeeValue);
  const accrued = annualAccruedDays(employee?.joining_date, new Date());
  const used = approvedAnnualUsedByEmployee(employeeDisplay(employee) || employeeValue, state.rows.leave_management || [], excludingId);
  return { employee, accrued, used: Number(used.toFixed(2)), remaining: Number(Math.max(0, accrued - used).toFixed(2)) };
}

function currentLeaveEmployee() {
  return currentUserEmployee();

function leaveEntitlementForEmployee(employee) {
  const join = parseAppDate(employee?.joining_date);
  if (!join) return "Not Set";
  const firstAnniversary = new Date(join);
  firstAnniversary.setFullYear(firstAnniversary.getFullYear() + 1);
  return new Date() >= firstAnniversary ? "30 Days" : "24 Days";
}

function upcomingLeaveStatus(employee, rows = state.rows.leave_management || []) {
  if (!employee) return "No Leave";
  const target = normalizePerson(employeeDisplay(employee));
  const today = parseAppDate(todayIso());
  const upcomingRows = rows.filter((row) => {
    const rowEmployee = normalizePerson(employeeDisplay(employeeForLeave(row.employee)) || row.employee);
    const start = parseAppDate(row.start_date);
    return rowEmployee === target && start && start >= today;
  });
  if (upcomingRows.some((row) => String(row.approval_status || "Pending") === "Pending")) return "Pending for Approval";
  if (upcomingRows.some((row) => String(row.approval_status || "") === "Approved")) return "Approved";
  return "No Leave";
}

async function updateLeaveApproval(id, status) {
  const existing = (state.rows.leave_management || []).find((row) => String(row.id) === String(id));
  if (!existing) throw new Error("Leave request not found.");
  if (!canApproveLeaveRow(existing)) throw new Error("You do not have permission to approve or reject this leave request.");
  const requestedDays = Number(existing.requested_days || daysBetweenInclusive(existing.start_date, existing.end_date));
  const isAnnual = String(existing.leave_type || "").toLowerCase() === "annual leave";
  const balance = leaveBalanceForEmployee(existing.employee, id);
  if (status === "Approved" && isAnnual && requestedDays > balance.remaining) {
    throw new Error(`Annual leave balance is ${balance.remaining} day(s). Requested ${requestedDays} day(s).`);
  }
  const payload = {
    id: existing.id,
    approval_status: status,
    requested_days: requestedDays,
    accrued_to_date: isAnnual ? balance.accrued : null,
    used: isAnnual && status === "Approved" ? Number((balance.used + requestedDays).toFixed(2)) : balance.used,
    remaining: isAnnual && status === "Approved" ? Number(Math.max(0, balance.remaining - requestedDays).toFixed(2)) : balance.remaining,
    approved_by: normalizedEmail(),
    approved_at: new Date().toISOString()
  };
  const saved = await upsertRow("leave_management", payload);
  state.savedRows.add(`leave_management:${id}`);
  setTimeout(() => state.savedRows.delete(`leave_management:${id}`), 1800);
  state.rows.leave_management = await fetchRows("leave_management");
  await showPage("leave_management");
  return saved;
}

function defaultAccessForRole(role) {
  const access = Object.fromEntries(accessPermissionFields.map((item) => [item.key, false]));
  if (role === "Super User" || role === "Admin") {
    accessPermissionFields.forEach((item) => { access[item.key] = true; });
  }
  return access;
}

function applyAccessLevelDefaults(form) {
  if (!form) return;
  const selectedLevel = form.querySelector('[data-access-field="role"]')?.value || "Viewer";
  const defaults = defaultAccessForRole(selectedLevel);
  accessPermissionFields.forEach((item) => {
    const checkbox = form.querySelector(`[data-access-permission="${item.key}"]`);

    if (selectedLevel === "Customized Level") return;
    checkbox.checked = Boolean(defaults[item.key]);
  });

  if (description && (!description.value || ["Viewer", "Admin", "Super User", "Customized Level"].includes(description.value))) {

async function createAccessProfile(form) {
  if (!isSuperUser()) throw new Error("Only the superuser can create access profiles.");
  const message = $("#accessControlMessage");
  if (message) message.textContent = "Creating profile...";
  const payload = accessFormPayload(form);
  if (!payload.team_member_id || !payload.team_member_name || !payload.email || !payload.password) {
    throw new Error("Please fill Team Member ID, Name, Email and Password.");
  }

  const currentSession = state.session;
  let authMessage = "Login account created.";
  const { error: signUpError } = await client.auth.signUp({
    email: payload.email,
    password: payload.password,
    options: { data: { display_name: payload.team_member_name, team_member_id: payload.team_member_id } }
  });
  if (signUpError && !String(signUpError.message || "").toLowerCase().includes("already")) {
    authMessage = `Profile saved, but login account needs Supabase user check: ${signUpError.message}`;
  } else if (signUpError) {
    authMessage = "Profile saved. Login account already exists.";
  }
  if (currentSession?.access_token && currentSession?.refresh_token) {
    await client.auth.setSession({ access_token: currentSession.access_token, refresh_token: currentSession.refresh_token });
    state.session = currentSession;
  }

  const profilePayload = { ...payload };
  delete profilePayload.password;
  const { error } = await client.from("admin_portal_users").upsert(profilePayload, { onConflict: "email" });
  if (error) throw error;
  if (message) message.textContent = `${authMessage} Access profile is active for ${payload.email}.`;
  form.reset();
  await renderAccessControlPage();
}

async function updateAccessProfile(row, button) {
  if (!isSuperUser()) throw new Error("Only the superuser can update access profiles.");
  const payload = existingAccessPayload(row);
  if (!payload.email) throw new Error("Unable to identify the selected member.");
  if (payload.email === normalizedEmail() && payload.role !== "Super User") {
    throw new Error("You cannot remove your own Super User access while signed in.");
  }
  const originalText = button?.textContent || "Save Access";
  if (button) {
    button.disabled = true;
    button.textContent = "Saving...";
  }
  const rpcPayload = {
    p_email: payload.email,
    p_role: payload.role,
    p_access_level: payload.access_level,
    p_is_active: payload.is_active
  };
  accessPermissionFields.forEach((item) => { rpcPayload[`p_${item.key}`] = payload[item.key]; });
  const { error: rpcError } = await client.rpc("update_admin_portal_user_access", rpcPayload);
  if (rpcError) {
    const { error } = await client.from("admin_portal_users").update(payload).eq("email", payload.email);
    if (error) throw new Error(rpcError.message || error.message);
  }
  if (button) {
    button.textContent = "Saved";
    window.setTimeout(() => { button.disabled = false; button.textContent = originalText; }, 900);
  }
  if (payload.email === normalizedEmail()) {
    state.portalUser = { ...(state.portalUser || {}), ...payload };
    renderNav();
  }
}

    <label>Notes<input data-hierarchy-field="notes" type="text" placeholder="Optional note"></label>
    <button type="submit">Add Hierarchy Rule</button>
  `;
}


function hierarchyFormPayload(form) {
  const managerSelect = form.querySelector('[data-hierarchy-field="manager_email"]');
  const employeeSelect = form.querySelector('[data-hierarchy-field="employee_ref"]');
  const selectedManager = managerSelect?.selectedOptions?.[0];
  const selectedEmployee = employeeSelect?.selectedOptions?.[0];
  let employeePayload = {};
  try { employeePayload = JSON.parse(selectedEmployee?.dataset.payload || "{}"); } catch { employeePayload = {}; }
  return {
    manager_email: String(managerSelect?.value || "").toLowerCase(),
    manager_name: selectedManager?.dataset.name || "",
    manager_employee_id: selectedManager?.dataset.id || "",
    visibility_scope: form.querySelector('[data-hierarchy-field="visibility_scope"]')?.value || "Juniors Only",
    employee_id: employeePayload.employee_id || "",
    employee_name: employeePayload.employee_name || selectedEmployee?.value || "",
    employee_email: employeePayload.employee_email || "",
    department: employeePayload.department || "",
    notes: form.querySelector('[data-hierarchy-field="notes"]')?.value.trim() || "",
    is_active: true
  };
}


async function createHierarchyRule(form) {
  if (!isSuperUser()) throw new Error("Only the superuser can manage hierarchy.");
  const payload = hierarchyFormPayload(form);
  if (!payload.manager_email) throw new Error("Please select a manager/senior.");
  if (!payload.employee_name && !["All Records", "Department", "Own Record Only"].includes(payload.visibility_scope)) {
    throw new Error("Please select an assigned employee for this scope.");
  }
  const { error } = await client.from("employee_hierarchy").upsert(payload, { onConflict: "manager_email,employee_name,employee_id" });
  if (error) throw error;
  form.reset();
  state.rows.employee_hierarchy = await fetchRows("employee_hierarchy");
  await renderHierarchyPage();
}


async function deleteHierarchyRule(id) {
  if (!isSuperUser()) throw new Error("Only the superuser can manage hierarchy.");
  const { error } = await client.from("employee_hierarchy").delete().eq("id", id);
  if (error) throw error;
  state.rows.employee_hierarchy = await fetchRows("employee_hierarchy");
  await renderHierarchyPage();
}

function safeCandidateValue(value) {
  return looksLikeNameValue(value) ? value : "";
}

function displayCandidateValue(row) {
  const candidate = row?.candidate;
  if (looksLikeNameValue(candidate)) return candidate;
  const fallback = fallbackCandidateFromRow(row);
  return fallback || (candidate ?? "");
}

function fallbackCandidateFromRow(row) {
  let fallback = "";
  let bestScore = -Infinity;
  Object.values(row || {}).forEach((value) => {
    const text = String(value || "").trim();
    if (!looksLikeNameValue(text)) return;
    const words = text.split(/\s+/).filter(Boolean).length;
    const score = text.length + (words * 4) + (/\s/.test(text) ? 3 : 0);
    if (score > bestScore) {
      bestScore = score;
      fallback = text;
    }
  });
  return fallback;
}

function fieldControl(column, value, editable = canEdit()) {
  const safeValue = String(value).replaceAll('"', "&quot;");
  if (!editable && column !== "cv_link") {
    return `<span class="readonly-cell">${escapeHtml(value || "-")}</span>`;
  }
  if (column === "cv_link") {
    const href = String(value || "").trim();
    const safeHref = href.replaceAll('"', "&quot;");
    const openLink = /^https?:\/\//i.test(href) ? `<a class="cv-open-link" href="${safeHref}" target="_blank" rel="noopener">Open CV</a>` : "";
    if (!isSuperUser()) {
      return openLink || '<span class="view-only-pill">No CV</span>';
    }
    return `<div class="cv-link-field"><input data-field="${column}" type="url" value="${safeValue}" placeholder="Paste OneDrive CV link">${openLink}</div>`;
  }
  if (column === "candidate") {
    return `<input data-field="${column}" type="text" value="${safeValue}">`;
  }
  if (options[column]) {
    const optionValues = options[column].includes(String(value)) || !value ? options[column] : [String(value), ...options[column]];
    return `<select data-field="${column}">${optionValues.map((item) => `<option ${String(value) === item ? "selected" : ""}>${item}</option>`).join("")}</select>`;
  }
  const type = column.includes("date") || column.includes("expiry") || column.includes("renewal") ? "date" : "text";
  return `<input data-field="${column}" type="${type}" value="${safeValue}">`;
}

async function loadPageData() {

}

async function loadTables(tables, options = {}) {
  const uniqueTables = [...new Set(tables)].filter((table) => isSuperUser() || canViewTable(table));
  if (!state.rows.employee_hierarchy) await loadHierarchyData();
  await Promise.all(uniqueTables.map(async (table) => {
    if (!options.force && state.rows[table]) return;
    try {
      state.rows[table] = await fetchRows(table);
    } catch (error) {
      state.rows[table] = [];
      if (!options.optional) console.warn("Unable to load " + table, error);
    }
  }));
}

async function loadDashboardData(options = {}) {
  const tables = dashboardTables.filter((table) => isSuperUser() || canViewTable(table));
  await loadTables(tables, { ...options, optional: true });
}

async function ensurePageData(page, options = {}) {
  if (!page.table) return;
  await loadTables([page.table], options);
}

async function showPage(key) {
  const page = pages.find((item) => item.key === key && canViewPage(item)) || pages[0];
  if (page.external) {
    window.open(page.external, "_blank", "noopener");
    return;
  }
  state.page = page.key;
  renderShell();
  if (page.key === "dashboard") {
    await loadDashboardData();
    renderDashboard();
  } else if (page.key === "access_control") {
    await renderAccessControlPage();
  } else if (page.key === "hierarchy") {
    await renderHierarchyPage();
  } else {
    if (page.table === "leave_management") {
      await loadTables(["leave_management", "employees"], { optional: true });
    } else {
      await ensurePageData(page);
    }
    renderTablePage(page);
  }
}

function rowFromElement(rowElement) {
  const row = {};
  if (rowElement.dataset.id) row.id = Number(rowElement.dataset.id);
  rowElement.querySelectorAll("[data-field]").forEach((input) => {
    const value = input.value.trim();
    if (value !== "") row[input.dataset.field] = value;
  });
  if (row.candidate && !looksLikeNameValue(row.candidate)) delete row.candidate;
  return row;
}

function downloadRecruitmentTemplate() {
  const headers = ["Candidate", "CV Link", "Position", "Source", "Mobile", "Location", "GCC Experience", "Total Experience", "Current Salary", "Expected Salary", "Notice Period", "Interview Date", "Status"];
  const sample = ["Candidate Name", "https://onedrive.live.com/example-cv-link", "Position Applied", "LinkedIn / Referral / Walk-in", "05xxxxxxxx", "Abu Dhabi", "2 Years", "5 Years", "5000", "7000", "30 Days", "2026-07-16", "Applied"];
  const lines = [headers, sample].map((row) => row.map(csvCell).join(","));
  const blob = new Blob([`\uFEFF${lines.join("\n")}`], { type: "text/csv;charset=utf-8" });
  const link = document.createElement("a");
  const href = URL.createObjectURL(blob);
  link.href = href;
  link.download = "recruitment-import-template.csv";
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(() => URL.revokeObjectURL(href), 1000);
}

function exportTableCsv(table) {
  const tableColumns = columns[table] || [];
  const rows = [...(state.rows[table] || [])];
  if (!rows.length) throw new Error("No recruitment records available to export.");
  const header = ["Sr. No", ...tableColumns.map(titleize)];
  const lines = [
    header.map(csvCell).join(","),
    ...rows.map((row, index) => [index + 1, ...tableColumns.map((column) => row[column] ?? "")].map(csvCell).join(","))
  ];
  const blob = new Blob([`\uFEFF${lines.join("\n")}`], { type: "text/csv;charset=utf-8" });
  const link = document.createElement("a");
  const href = URL.createObjectURL(blob);
  link.href = href;
  link.download = `${table}-data-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(() => URL.revokeObjectURL(href), 1000);
}

function normalizeHeader(value) {
  return String(value || "").trim().toLowerCase().replace(/[_-]+/g, " ").replace(/\s+/g, " ");
}

async function ensureExcelLibrary() {
  if (window.XLSX) return;
  const script = document.createElement("script");
  script.src = "https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js";
  await new Promise((resolve, reject) => {
    script.onload = resolve;
    script.onerror = reject;
    document.head.appendChild(script);
  });
}

async function readImportRows(file) {
  if (file.name.toLowerCase().endsWith(".csv")) {
    const text = await file.text();
    return text.split(/\r?\n/).filter(Boolean).map((line) => line.split(","));
  }
  await ensureExcelLibrary();
  const buffer = await file.arrayBuffer();
  const workbook = window.XLSX.read(buffer, { type: "array", cellDates: false });
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  return window.XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: "" });
}

function mapImportRows(table, rawRows) {
  const cols = columns[table] || [];
  const header = (rawRows[0] || []).map(normalizeHeader);
  const aliases = {
    candidate: ["candidate", "candidate name", "full name", "applicant", "applicant name"],
    cv_link: ["cv link", "candidate cv", "candidate cv link", "resume", "resume link", "onedrive", "onedrive link"],
    position: ["position", "job title", "role", "designation"],
    source: ["source", "cv source", "recruitment source"],
    mobile: ["mobile", "phone", "contact number"],
    location: ["location", "city", "current location"],
    gcc_experience: ["gcc experience", "gcc exp"],
    total_experience: ["total experience", "experience"],
    current_salary: ["current salary", "salary"],
    expected_salary: ["expected salary", "expected"],
    notice_period: ["notice period", "notice"],
    interview_date: ["interview date", "date"],
    status: ["status", "stage"]
  };
  return rawRows.slice(1).map((rawRow) => {
    const row = {};
    cols.forEach((column) => {
      const labels = [column, titleize(column), ...(aliases[column] || [])].map(normalizeHeader);
      const index = labels.map((label) => header.indexOf(label)).find((match) => match >= 0);
      if (index === undefined) return;
      const value = String(rawRow[index] || "").trim();
      if (value !== "") row[column] = value;
    });
    if (!row.status) row.status = "Applied";
    return row;
  }).filter((row) => row.candidate && !looksLikeDateValue(row.candidate));
}

async function importTableFile(table, file) {
  const rawRows = await readImportRows(file);
  if (rawRows.length < 2) throw new Error("No import rows found.");
  const rows = mapImportRows(table, rawRows);
  if (!rows.length) throw new Error("No valid recruitment rows found.");
  const { error } = await client.from(table).insert(rows);
  if (error) throw error;
  if (table === "recruitment") {
    await Promise.all(rows.map((row) => syncInterviewEvaluationFromRecruitment(row)));
    delete state.rows.interview_evaluation;
  }
  return rows.length;
}

document.addEventListener("click", async (event) => {
  const pageButton = event.target.closest("[data-page]");
  const filterButton = event.target.closest("[data-filter]");
  const accessButton = event.target.closest("[data-save-access]");
  const saveButton = event.target.closest("[data-save]");
  const deleteButton = event.target.closest("[data-delete]");
  const importButton = event.target.closest("[data-import]");
  const exportButton = event.target.closest("[data-export]");
  const clearButton = event.target.closest("[data-clear-table]");
  const templateButton = event.target.closest("[data-recruitment-template]");
  const approveLeaveButton = event.target.closest("[data-approve-leave]");
  const rejectLeaveButton = event.target.closest("[data-reject-leave]");
  const deleteLeaveButton = event.target.closest("[data-delete-leave]");

  try {
    if (accessButton) {
      await updateAccessProfile(accessButton.closest("tr"), accessButton);
      return;
    }
    if (approveLeaveButton) await updateLeaveApproval(approveLeaveButton.dataset.approveLeave, "Approved");
    if (rejectLeaveButton) await updateLeaveApproval(rejectLeaveButton.dataset.rejectLeave, "Rejected");
    if (event.target.closest("[data-delete-hierarchy]") && confirm("Delete this hierarchy rule?")) {
      await deleteHierarchyRule(event.target.closest("[data-delete-hierarchy]").dataset.deleteHierarchy);
      return;
    }
    if (deleteLeaveButton && isSuperUser() && confirm("Delete this leave request?")) {
      await deleteRow("leave_management", deleteLeaveButton.dataset.deleteLeave);
      state.rows.leave_management = await fetchRows("leave_management");
      await showPage("leave_management");
    }
    if (pageButton) await showPage(pageButton.dataset.page);
    if (filterButton) {
      state.activeFilter = filterButton.dataset.filter;
      await showPage(state.page);
    }
    if (importButton) {
      if (!canEditTable(importButton.dataset.import)) throw new Error("You do not have permission to import this data.");
      $("#recruitmentImportFile")?.click();
    }
    if (exportButton) {
      if (!canExportTable(exportButton.dataset.export)) throw new Error("You do not have permission to export this data.");
      exportTableCsv(exportButton.dataset.export);
    }
    if (templateButton) downloadRecruitmentTemplate();
    if (clearButton && canEditTable(clearButton.dataset.clearTable) && confirm("This will delete all Recruitment Tracker records. Continue?")) {
      await clearTable(clearButton.dataset.clearTable);
      state.rows[clearButton.dataset.clearTable] = await fetchRows(clearButton.dataset.clearTable);
      await showPage(state.page);
    }
    if (saveButton) {
      const page = pages.find((item) => item.key === state.page);
      if (!canEditTable(page.table)) throw new Error("You do not have permission to edit this data.");
      const savedRow = await upsertRow(page.table, rowFromElement(saveButton.closest("tr")));
      if (page.table === "recruitment") {
        await syncInterviewEvaluationFromRecruitment(savedRow);
        delete state.rows.interview_evaluation;
      }
      state.rows[page.table] = await fetchRows(page.table);
      await showPage(state.page);
    }
    if (deleteButton && confirm("Delete this record?")) {
      const page = pages.find((item) => item.key === state.page);
      if (!canEditTable(page.table)) throw new Error("You do not have permission to delete this data.");
      await deleteRow(page.table, deleteButton.dataset.delete);
      state.rows[page.table] = await fetchRows(page.table);
      await showPage(state.page);
    }
  } catch (error) {
    alert(error.message || error);
  }
});

    await loadDashboardData();
    await loadHierarchyData();
    renderShell();
    renderDashboard();
  } catch (error) {
    const errorParts = [];
    if (error?.message) errorParts.push(error.message);
    if (error?.error_description) errorParts.push(error.error_description);
    if (error?.details) errorParts.push(error.details);
    if (error?.hint) errorParts.push(error.hint);
    const props = Object.getOwnPropertyNames(error || {}).filter((key) => !["stack"].includes(key)).map((key) => `${key}: ${String(error[key])}`);
    if (props.length) errorParts.push(props.join(" | "));
    if (!errorParts.length && typeof error === "string") errorParts.push(error);
    $("#loginMessage").textContent = errorParts.join(" - ") || "Login failed. Please check access and try again.";
  }
});

$("#recordForm").addEventListener("submit", async (event) => {
  event.preventDefault();
  const page = pages.find((item) => item.key === state.page);
  if (page.key === "access_control") {
    await createAccessProfile(event.currentTarget);
    return;
  }
  if (page.key === "hierarchy") {
    await createHierarchyRule(event.currentTarget);
    return;
  }
  if (page.table === "leave_management") {
    if (!canRequestLeave()) throw new Error("You do not have permission to submit leave requests.");
    const row = rowFromElement(event.currentTarget);
    row.approval_status = "Pending";
    row.requested_by = normalizedEmail();
    row.submitted_at = new Date().toISOString();
    row.requested_days = Number(row.requested_days || daysBetweenInclusive(row.start_date, row.end_date));
    if (!row.requested_days) throw new Error("Please select valid leave dates or requested days.");
    const balance = leaveBalanceForEmployee(row.employee);
    const isAnnual = String(row.leave_type || "").toLowerCase() === "annual leave";
    row.accrued_to_date = isAnnual ? balance.accrued : null;
    row.used = isAnnual ? balance.used : null;
    row.remaining = isAnnual ? balance.remaining : null;
    await upsertRow(page.table, row);
    state.rows[page.table] = await fetchRows(page.table);
    event.currentTarget.reset();
    await showPage(state.page);
    return;
  }
  if (!canEditTable(page.table)) throw new Error("You do not have permission to add this data.");
  const row = rowFromElement(event.currentTarget);
  const savedRow = await upsertRow(page.table, row);
  if (page.table === "recruitment") {
    await syncInterviewEvaluationFromRecruitment(savedRow);
    delete state.rows.interview_evaluation;
  }
  state.rows[page.table] = await fetchRows(page.table);
  event.currentTarget.reset();
  await showPage(state.page);
});

  <script>
    (function () {
      function normalizeLogoutText() {
        var button = document.getElementById('refreshButton');
        if (button && button.textContent.trim() !== 'Logout') button.textContent = 'Logout';
      }
      function setupPasswordToggle() {
        var input = document.getElementById('password');
        var button = document.getElementById('passwordToggle');
        if (!input || !button || button.dataset.passwordReady === 'true') return;
        button.dataset.passwordReady = 'true';
        button.textContent = 'Eye';
        button.setAttribute('aria-label', 'Hold to show password');
        button.setAttribute('title', 'Hold to show password');
        function showPassword(event) { if (event) event.preventDefault(); input.type = 'text'; button.classList.add('password-visible'); }
        function hidePassword(event) { if (event) event.preventDefault(); input.type = 'password'; button.classList.remove('password-visible'); }
        button.addEventListener('pointerdown', showPassword);
        button.addEventListener('pointerup', hidePassword);
        button.addEventListener('pointercancel', hidePassword);
        button.addEventListener('pointerleave', hidePassword);
        button.addEventListener('blur', hidePassword);
        button.addEventListener('keydown', function (event) { if (event.key === ' ' || event.key === 'Enter') showPassword(event); });
        button.addEventListener('keyup', function (event) { if (event.key === ' ' || event.key === 'Enter') hidePassword(event); });
      }
      function refreshUiHelpers() { normalizeLogoutText(); setupPasswordToggle(); }
      function markActionButton(button) {
        if (!button || button.classList.contains('action-working') || button.classList.contains('action-done')) return;
        button.dataset.originalText = button.textContent.trim();
        button.classList.add('action-working');
        button.textContent = '';
        window.setTimeout(function () { button.classList.remove('action-working'); button.classList.add('action-done'); button.textContent = '✓'; }, 360);
      }
      document.addEventListener('click', function (event) {
        var button = event.target.closest('[data-save], [data-delete]');
        if (!button) return;
        markActionButton(button);
      }, true);
      refreshUiHelpers();
      new MutationObserver(refreshUiHelpers).observe(document.body, { childList: true, subtree: true });
    })();
  </script>
