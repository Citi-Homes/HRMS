function titleize(value) {

function escapeHtml(value) {

function csvCell(value) {

function looksLikeDateValue(value) {
  const text = String(value || "").trim();
  return /^\d{1,2}[/-]\d{1,2}[/-]\d{2,4}$/.test(text) ||
    /^\d{4}[/-]\d{1,2}[/-]\d{1,2}$/.test(text) ||
    /^\d{1,2}\s+[A-Za-z]{3,}\s+\d{2,4}$/.test(text);
}

function looksLikeNameValue(value) {
  const text = String(value || "").trim();
  return Boolean(text) && text.length >= 3 && !looksLikeDateValue(text) && /[A-Za-z]/.test(text);
}

async function signIn(email, password) {
  if (!client) throw new Error("Supabase anon key is not configured in assets/supabase-config.js.");
  const { data, error } = await client.auth.signInWithPassword({ email, password });
  if (error) throw error;
  state.session = data.session;
  state.portalUser = await verifyPortalAccess();
  return data.session;
}

async function verifyPortalAccess() {
  const email = normalizedEmail();
  if (!email) throw new Error("Unable to identify the signed-in account.");
  const { data, error } = await client
    .from("admin_portal_users")
    .select("email,role,is_active,can_manage_leave,can_view_attendance,can_view_employee_master,can_view_recruitment,can_manage_vendors,can_manage_inventory,can_manage_pantry")
    .eq("email", email)
    .eq("is_active", true)
    .maybeSingle();
  if (error) throw new Error("Your login worked, but the administration access rule is not ready yet.");
  if (!data) {
    await client.auth.signOut();
    throw new Error("This account is not approved for the Administration System.");
  }
  return data;
}

async function fetchRows(table) {
  const { data, error } = await client.from(table).select("*").order("id", { ascending: true }).limit(1000);
  if (error) throw error;
  return data || [];
}

async function upsertRow(table, row) {
  const { data, error } = await client.from(table).upsert(row).select().single();
  if (error) throw error;
  return data;
}

function isInterviewScheduled(row) {
  return String(row?.status || "").trim().toLowerCase() === "interview scheduled";
}

async function syncInterviewEvaluationFromRecruitment(row) {
  if (!row || !isInterviewScheduled(row) || !looksLikeNameValue(row.candidate)) return;

  const payload = {
    candidate: row.candidate,
    position: row.position || "",
    department: "Citi Homes",
    interview_date: row.interview_date || null
  };
  Object.keys(payload).forEach((key) => {
    if (payload[key] === "" || payload[key] === null || payload[key] === undefined) delete payload[key];
  });

  let query = client.from("interview_evaluation").select("id").eq("candidate", row.candidate).limit(1);
  if (row.position) query = query.eq("position", row.position);
  if (row.interview_date) query = query.eq("interview_date", row.interview_date);

  const { data, error } = await query;
  if (error) throw error;

  const existing = (data || [])[0];
  if (existing?.id) {
    const { error: updateError } = await client.from("interview_evaluation").update(payload).eq("id", existing.id);
    if (updateError) throw updateError;
    return;
  }

  const { error: insertError } = await client.from("interview_evaluation").insert(payload);
  if (insertError) throw insertError;
}

async function deleteRow(table, id) {
  const { error } = await client.from(table).delete().eq("id", id);
  if (error) throw error;
}

async function clearTable(table) {
  const batchSize = 250;
  for (;;) {
    const { data, error } = await client.from(table).select("id").order("id", { ascending: true }).limit(batchSize);
    if (error) throw error;
    const ids = (data || []).map((row) => row.id).filter((id) => id !== null && id !== undefined);
    if (!ids.length) break;
    const { error: deleteError } = await client.from(table).delete().in("id", ids);
    if (deleteError) throw deleteError;
    if (ids.length < batchSize) break;
  }
}

function parseAppDate(value) {
  if (!value) return null;
  const date = new Date(value);
  return Number.isNaN(date.getTime()) ? null : date;
}

function todayIso() {
  return new Date().toISOString().slice(0, 10);
}

function daysBetweenInclusive(startValue, endValue) {
  const start = parseAppDate(startValue);
  const end = parseAppDate(endValue);
  if (!start || !end || end < start) return 0;
  return Math.floor((end - start) / 86400000) + 1;
}

function annualAccruedDays(joiningDate, asOfDate = new Date()) {
  const join = parseAppDate(joiningDate);
  if (!join || asOfDate < join) return 0;
  const firstAnniversary = new Date(join);
  firstAnniversary.setFullYear(firstAnniversary.getFullYear() + 1);
  const firstEnd = asOfDate < firstAnniversary ? asOfDate : firstAnniversary;
  const firstDays = Math.max(0, (firstEnd - join) / 86400000);
  const laterDays = asOfDate > firstAnniversary ? Math.max(0, (asOfDate - firstAnniversary) / 86400000) : 0;
  return Number(((firstDays * (24 / 365)) + (laterDays * (30 / 365))).toFixed(2));
}

function normalizePerson(value) {
  return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
}

function employeeDisplay(employee) {
  if (!employee) return "";
  return [employee.employee_id, employee.name].filter(Boolean).join(" - ") || employee.name || employee.employee_id || "";
}

function employeeForLeave(value) {
  const employees = state.rows.employees || [];
  const target = normalizePerson(value);
  return employees.find((employee) => {
    const name = normalizePerson(employee.name);
    const id = normalizePerson(employee.employee_id);
    const combined = normalizePerson(employeeDisplay(employee));
    return target === name || target === id || target === combined || combined.includes(target) || target.includes(name);
  }) || null;
}

function approvedAnnualUsedByEmployee(employeeValue, rows = state.rows.leave_management || [], excludingId = null) {
  const employee = employeeForLeave(employeeValue);
  const target = normalizePerson(employeeDisplay(employee) || employeeValue);
  return rows.reduce((sum, row) => {
    if (excludingId && String(row.id) === String(excludingId)) return sum;
    if (String(row.leave_type || "").toLowerCase() !== "annual leave") return sum;
    if (String(row.approval_status || "").toLowerCase() !== "approved") return sum;
    const rowEmployee = normalizePerson(employeeDisplay(employeeForLeave(row.employee)) || row.employee);
    if (rowEmployee !== target) return sum;
    return sum + Number(row.requested_days || row.used || 0);
  }, 0);
}

function leaveBalanceForEmployee(employeeValue, excludingId = null) {
  const employee = employeeForLeave(employeeValue);
  const accrued = annualAccruedDays(employee?.joining_date, new Date());
  const used = approvedAnnualUsedByEmployee(employeeDisplay(employee) || employeeValue, state.rows.leave_management || [], excludingId);
  return { employee, accrued, used: Number(used.toFixed(2)), remaining: Number(Math.max(0, accrued - used).toFixed(2)) };
}

  table.className = "compact-table leave-table";

    table.innerHTML = `<tbody><tr><td class="empty-state">No leave requests found.</td></tr></tbody>`;

      <tbody>
        ${rows.map((row, index) => {
          const requestedDays = Number(row.requested_days || daysBetweenInclusive(row.start_date, row.end_date));
          const balance = leaveBalanceForEmployee(row.employee, row.id);
          const isAnnual = String(row.leave_type || "").toLowerCase() === "annual leave";
          const status = row.approval_status || "Pending";
          const accrued = isAnnual ? Number(row.accrued_to_date || balance.accrued).toFixed(2) : "-";
          const used = isAnnual ? Number(row.used || balance.used).toFixed(2) : "-";
          const remaining = isAnnual ? Number(row.remaining ?? Math.max(0, balance.remaining - (status === "Approved" ? requestedDays : 0))).toFixed(2) : "-";
          return `
            <tr data-id="${row.id || ""}">
              <td>${index + 1}</td>

              <td><span class="readonly-cell">${escapeHtml(row.leave_type || "-")}</span></td>
              <td><span class="readonly-cell">${escapeHtml(row.start_date || "-")}</span></td>
              <td><span class="readonly-cell">${escapeHtml(row.end_date || "-")}</span></td>

              <td><span class="readonly-cell">${used}</span></td>
              <td><span class="readonly-cell highlighted-balance">${remaining}</span></td>
              <td><span class="view-only-pill">${escapeHtml(status)}</span></td>
              <td><span class="readonly-cell wide-text">${escapeHtml(row.remarks || "-")}</span></td>
              <td class="row-actions">
                ${isSuperUser() && status !== "Approved" ? `<button type="button" class="save-button" data-approve-leave="${row.id}">Approve</button>` : ""}
                ${isSuperUser() && status !== "Rejected" ? `<button type="button" class="danger" data-reject-leave="${row.id}">Reject</button>` : ""}
                ${isSuperUser() ? `<button type="button" class="danger" data-delete-leave="${row.id}">Delete</button>` : `<span class="view-only-pill">View only</span>`}
              </td>
            </tr>

}

async function updateLeaveApproval(id, status) {
  if (!isSuperUser()) throw new Error("Only the superuser can approve or reject leave requests.");
  const existing = (state.rows.leave_management || []).find((row) => String(row.id) === String(id));
  if (!existing) throw new Error("Leave request not found.");
  const requestedDays = Number(existing.requested_days || daysBetweenInclusive(existing.start_date, existing.end_date));
  const isAnnual = String(existing.leave_type || "").toLowerCase() === "annual leave";
  const balance = leaveBalanceForEmployee(existing.employee, id);
  if (status === "Approved" && isAnnual && requestedDays > balance.remaining) {
    throw new Error(`Annual leave balance is ${balance.remaining} day(s). Requested ${requestedDays} day(s).`);
  }
  const payload = {
    id: existing.id,
    approval_status: status,
    requested_days: requestedDays,
    accrued_to_date: isAnnual ? balance.accrued : null,
    used: isAnnual && status === "Approved" ? Number((balance.used + requestedDays).toFixed(2)) : balance.used,
    remaining: isAnnual && status === "Approved" ? Number(Math.max(0, balance.remaining - requestedDays).toFixed(2)) : balance.remaining,
    approved_by: normalizedEmail(),
    approved_at: new Date().toISOString()
  };
  const saved = await upsertRow("leave_management", payload);
  state.savedRows.add(`leave_management:${id}`);
  setTimeout(() => state.savedRows.delete(`leave_management:${id}`), 1800);
  state.rows.leave_management = await fetchRows("leave_management");
  await showPage("leave_management");
  return saved;
}

function safeCandidateValue(value) {
  return looksLikeNameValue(value) ? value : "";
}

function displayCandidateValue(row) {
  const candidate = row?.candidate;
  if (looksLikeNameValue(candidate)) return candidate;
  const fallback = fallbackCandidateFromRow(row);
  return fallback || (candidate ?? "");
}

function fallbackCandidateFromRow(row) {
  let fallback = "";
  let bestScore = -Infinity;
  Object.values(row || {}).forEach((value) => {
    const text = String(value || "").trim();
    if (!looksLikeNameValue(text)) return;
    const words = text.split(/\s+/).filter(Boolean).length;
    const score = text.length + (words * 4) + (/\s/.test(text) ? 3 : 0);
    if (score > bestScore) {
      bestScore = score;
      fallback = text;
    }
  });
  return fallback;
}

function fieldControl(column, value, editable = canEdit()) {
  const safeValue = String(value).replaceAll('"', "&quot;");
  if (!editable && column !== "cv_link") {
    return `<span class="readonly-cell">${escapeHtml(value || "-")}</span>`;
  }
  if (column === "cv_link") {
    const href = String(value || "").trim();
    const safeHref = href.replaceAll('"', "&quot;");
    const openLink = /^https?:\/\//i.test(href) ? `<a class="cv-open-link" href="${safeHref}" target="_blank" rel="noopener">Open CV</a>` : "";
    if (!isSuperUser()) {
      return openLink || '<span class="view-only-pill">No CV</span>';
    }
    return `<div class="cv-link-field"><input data-field="${column}" type="url" value="${safeValue}" placeholder="Paste OneDrive CV link">${openLink}</div>`;
  }
  if (column === "candidate") {
    return `<input data-field="${column}" type="text" value="${safeValue}">`;
  }
  if (options[column]) {
    const optionValues = options[column].includes(String(value)) || !value ? options[column] : [String(value), ...options[column]];
    return `<select data-field="${column}">${optionValues.map((item) => `<option ${String(value) === item ? "selected" : ""}>${item}</option>`).join("")}</select>`;
  }
  const type = column.includes("date") || column.includes("expiry") || column.includes("renewal") ? "date" : "text";
  return `<input data-field="${column}" type="${type}" value="${safeValue}">`;
}

function rowFromElement(rowElement) {

    const value = input.value.trim();
    if (value !== "") row[input.dataset.field] = value;
  });
  if (row.candidate && !looksLikeNameValue(row.candidate)) delete row.candidate;
  return row;
}

function downloadRecruitmentTemplate() {
  const headers = ["Candidate", "CV Link", "Position", "Source", "Mobile", "Location", "GCC Experience", "Total Experience", "Current Salary", "Expected Salary", "Notice Period", "Interview Date", "Status"];
  const sample = ["Candidate Name", "https://onedrive.live.com/example-cv-link", "Position Applied", "LinkedIn / Referral / Walk-in", "05xxxxxxxx", "Abu Dhabi", "2 Years", "5 Years", "5000", "7000", "30 Days", "2026-07-16", "Applied"];
  const lines = [headers, sample].map((row) => row.map(csvCell).join(","));

function exportTableCsv(table) {

  ];

  const link = document.createElement("a");
  const href = URL.createObjectURL(blob);

  document.body.appendChild(link);

  link.remove();
  setTimeout(() => URL.revokeObjectURL(href), 1000);
}

function normalizeHeader(value) {
  return String(value || "").trim().toLowerCase().replace(/[_-]+/g, " ").replace(/\s+/g, " ");
}

async function ensureExcelLibrary() {
  if (window.XLSX) return;
  const script = document.createElement("script");
  script.src = "https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js";
  await new Promise((resolve, reject) => {
    script.onload = resolve;
    script.onerror = reject;
    document.head.appendChild(script);
  });
}

async function readImportRows(file) {
  if (file.name.toLowerCase().endsWith(".csv")) {
    const text = await file.text();
    return text.split(/\r?\n/).filter(Boolean).map((line) => line.split(","));
  }
  await ensureExcelLibrary();
  const buffer = await file.arrayBuffer();
  const workbook = window.XLSX.read(buffer, { type: "array", cellDates: false });
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  return window.XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: "" });
}

function mapImportRows(table, rawRows) {
  const cols = columns[table] || [];
  const header = (rawRows[0] || []).map(normalizeHeader);
  const aliases = {
    candidate: ["candidate", "candidate name", "full name", "applicant", "applicant name"],
    cv_link: ["cv link", "candidate cv", "candidate cv link", "resume", "resume link", "onedrive", "onedrive link"],
    position: ["position", "job title", "role", "designation"],
    source: ["source", "cv source", "recruitment source"],
    mobile: ["mobile", "phone", "contact number"],
    location: ["location", "city", "current location"],
    gcc_experience: ["gcc experience", "gcc exp"],
    total_experience: ["total experience", "experience"],
    current_salary: ["current salary", "salary"],
    expected_salary: ["expected salary", "expected"],
    notice_period: ["notice period", "notice"],
    interview_date: ["interview date", "date"],
    status: ["status", "stage"]
  };
  return rawRows.slice(1).map((rawRow) => {
    const row = {};
    cols.forEach((column) => {
      const labels = [column, titleize(column), ...(aliases[column] || [])].map(normalizeHeader);
      const index = labels.map((label) => header.indexOf(label)).find((match) => match >= 0);
      if (index === undefined) return;
      const value = String(rawRow[index] || "").trim();
      if (value !== "") row[column] = value;
    });
    if (!row.status) row.status = "Applied";
    return row;
  }).filter((row) => row.candidate && !looksLikeDateValue(row.candidate));
}

async function importTableFile(table, file) {
  const rawRows = await readImportRows(file);
  if (rawRows.length < 2) throw new Error("No import rows found.");
  const rows = mapImportRows(table, rawRows);
  if (!rows.length) throw new Error("No valid recruitment rows found.");
  const { error } = await client.from(table).insert(rows);
  if (error) throw error;
  if (table === "recruitment") {
    await Promise.all(rows.map((row) => syncInterviewEvaluationFromRecruitment(row)));
    delete state.rows.interview_evaluation;
  }
  return rows.length;
}

document.addEventListener("click", async (event) => {
  const pageButton = event.target.closest("[data-page]");
  const filterButton = event.target.closest("[data-filter]");
  const saveButton = event.target.closest("[data-save]");
  const deleteButton = event.target.closest("[data-delete]");
  const importButton = event.target.closest("[data-import]");
  const exportButton = event.target.closest("[data-export]");
  const clearButton = event.target.closest("[data-clear-table]");
  const templateButton = event.target.closest("[data-recruitment-template]");
  const approveLeaveButton = event.target.closest("[data-approve-leave]");
  const rejectLeaveButton = event.target.closest("[data-reject-leave]");
  const deleteLeaveButton = event.target.closest("[data-delete-leave]");

  try {
    if (approveLeaveButton) await updateLeaveApproval(approveLeaveButton.dataset.approveLeave, "Approved");
    if (rejectLeaveButton) await updateLeaveApproval(rejectLeaveButton.dataset.rejectLeave, "Rejected");
    if (deleteLeaveButton && isSuperUser() && confirm("Delete this leave request?")) {
      await deleteRow("leave_management", deleteLeaveButton.dataset.deleteLeave);
      state.rows.leave_management = await fetchRows("leave_management");
      await showPage("leave_management");
    }
    if (pageButton) await showPage(pageButton.dataset.page);
    if (filterButton) {
      state.activeFilter = filterButton.dataset.filter;
      await showPage(state.page);
    }
    if (importButton) {
      if (!canEditTable(importButton.dataset.import)) throw new Error("You do not have permission to import this data.");
      $("#recruitmentImportFile")?.click();
    }
    if (exportButton) {
      if (!canExportTable(exportButton.dataset.export)) throw new Error("You do not have permission to export this data.");
      exportTableCsv(exportButton.dataset.export);
    }
    if (templateButton) downloadRecruitmentTemplate();
    if (clearButton && canEditTable(clearButton.dataset.clearTable) && confirm("This will delete all Recruitment Tracker records. Continue?")) {
      await clearTable(clearButton.dataset.clearTable);
      state.rows[clearButton.dataset.clearTable] = await fetchRows(clearButton.dataset.clearTable);
      await showPage(state.page);
    }
    if (saveButton) {
      const page = pages.find((item) => item.key === state.page);
      if (!canEditTable(page.table)) throw new Error("You do not have permission to edit this data.");
      const savedRow = await upsertRow(page.table, rowFromElement(saveButton.closest("tr")));
      if (page.table === "recruitment") {
        await syncInterviewEvaluationFromRecruitment(savedRow);
        delete state.rows.interview_evaluation;
      }
      state.rows[page.table] = await fetchRows(page.table);
      await showPage(state.page);
    }
    if (deleteButton && confirm("Delete this record?")) {
      const page = pages.find((item) => item.key === state.page);
      if (!canEditTable(page.table)) throw new Error("You do not have permission to delete this data.");
      await deleteRow(page.table, deleteButton.dataset.delete);
      state.rows[page.table] = await fetchRows(page.table);
      await showPage(state.page);
    }
  } catch (error) {
    alert(error.message || error);
  }
});

      }
      document.addEventListener('click', function (event) {
        var button = event.target.closest('[data-save], [data-delete]');
        if (!button) return;
        markActionButton(button);
      }, true);
      refreshUiHelpers();
      new MutationObserver(refreshUiHelpers).observe(document.body, { childList: true, subtree: true });
    })();
  </script>
</body>
</html>
